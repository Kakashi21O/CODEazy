<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Review student suggestions for CODEazy notes.">
  <title>Review Suggestions — CODEazy</title>

  <link rel="stylesheet" href="css/home_page.css">
  <link rel="stylesheet" href="css/notes.css">
  <link rel="stylesheet" href="css/pdf_viewer.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    .suggestion-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .suggestion-context {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .suggestion-text-diff {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    .text-original {
      background: rgba(239, 68, 68, 0.1);
      border-left: 4px solid var(--state-error);
      padding: 12px;
      color: #fca5a5;
      font-family: var(--font-primary);
    }
    .text-new {
      background: rgba(34, 197, 94, 0.1);
      border-left: 4px solid var(--state-success);
      padding: 12px;
      color: #86efac;
      font-family: var(--font-primary);
    }
    .suggestion-students {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }
    .suggestion-actions {
      display: flex;
      gap: 12px;
    }
    .btn-approve {
      background: var(--state-success);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-reject {
      background: var(--state-error);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    #suggestions-empty {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────────────────── -->
<header></header>

<!-- ── Main ─────────────────────────────────────────────────────────────── -->
<main class="notes-page">
  <div id="split-layout" style="display: flex; justify-content: center; gap: 24px; padding: 0 24px;">
    <!-- Left panel for full notes (hidden by default) -->
    <div id="notes-context-panel" style="display: none; flex: 1; max-width: 800px; background: var(--bg-surface); padding: 24px; border-radius: 12px; border: 1px solid var(--border-color); overflow-y: auto; max-height: calc(100vh - 120px);">
      <h2 id="context-title" style="margin-top: 0;">Notes Context</h2>
      <div id="context-content" class="notes-content" style="color: var(--text-primary);"></div>
    </div>

    <!-- Right panel (suggestions list) -->
    <div class="notes-container" style="flex: 1; max-width: 800px; margin: 0;">

      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom: 32px;">
        <div>
          <p class="notes-page-title">Teacher Dashboard</p>
          <h1 class="notes-heading">Review Suggestions</h1>
        </div>
        <button class="complete-btn" onclick="window.location='notes.html'" style="background:var(--bg-surface); border:1px solid var(--border-color); color:var(--text-primary);">Back to Notes</button>
      </div>

      <div id="suggestions-list">
        <div id="suggestions-empty" style="display:none;">No pending suggestions.</div>
        <div id="suggestions-loading" style="padding: 40px; text-align: center;">Loading suggestions...</div>
      </div>

    </div>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script src="js/suggestions.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const u = Auth.getUser();
    if (!u || (u.role !== 'teacher' && u.role !== 'admin')) {
      window.location.href = 'notes.html';
    }
  });
</script>
</body>
</html>
