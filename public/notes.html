<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse courses and study notes on Python, JavaScript, C++, DSA, and Web Development — CODEazy.">
  <title>Notes — CODEazy</title>

  <link rel="stylesheet" href="css/home_page.css">
  <link rel="stylesheet" href="css/notes.css">
  <link rel="stylesheet" href="css/pdf_viewer.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────────────────── -->
<header>
  <a href="home.html" class="logo">
    <img src="images/logo.png" alt="CODEazy Logo">
  </a>
  <nav>
    <a href="home.html">Home</a>
    <a href="notes.html">Notes</a>
    <a href="teachers.html">Teachers</a>
    <a href="about.html">About</a>
  </nav>
  <a href="login.html" id="nav-login-btn" class="login">Login</a>
  <div id="nav-user-menu" style="display:none; align-items:center; gap:16px;">
    <a href="dashboard.html" class="login" style="padding:10px 24px;">
      👤 <span id="nav-user-name"></span>
    </a>
    <button id="nav-logout-btn" class="login" style="border:none; cursor:pointer; background:rgba(255,80,80,.12); color:#ff8080; padding:10px 20px;">Logout</button>
  </div>
</header>

<!-- ── Main ─────────────────────────────────────────────────────────────── -->
<main class="notes-page">
  <div class="notes-container">

    <!-- ── View 1: Course grid ─────────────────────────────────────────── -->
    <div id="course-view">
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
        <div>
          <p class="notes-page-title">Study Materials</p>
          <h1 class="notes-heading">Browse Courses</h1>
        </div>
        <button id="add-notes-btn" style="display:none;" class="complete-btn" onclick="window.location='admin.html#upload'">+ Add Notes</button>
      </div>
      <p class="notes-sub">Select a course to explore topics and detailed notes.</p>
      <div id="course-grid">
        <!-- skeleton placeholders -->
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </div>

    <!-- ── View 2: Subject list ────────────────────────────────────────── -->
    <div id="subject-view">
      <button class="back-btn" onclick="showCourseView()">← Back to Courses</button>
      <h2 class="subject-course-title" id="sv-title"></h2>
      <p class="subject-course-desc" id="sv-desc"></p>
      <div class="subject-list" id="subject-list"></div>
    </div>

      <!-- ── View 3: Notes viewer ────────────────────────────────────────── -->
    <div id="notes-view">
      <button class="back-btn" id="notes-back-btn">← Back to Topics</button>
      <div class="notes-viewer-header">
        <div>
          <h2 class="notes-viewer-title" id="nv-title" style="margin-bottom: 8px;"></h2>
          <a id="nv-pdf-btn" class="auth-submit" style="display:none; padding:8px 16px; font-size:13px; text-decoration:none;" target="_blank"><img src="/file_download_logo.png" alt="Download" style="width:18px;height:18px;margin-right:6px;vertical-align:middle;"> Download Original PDF</a>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
          <span id="nv-save-status" style="display:none; font-size:12px; padding:4px 12px; border-radius:999px; background:rgba(91,220,174,0.12); color:#5bdcae;"></span>
          <button class="complete-btn" id="complete-btn" onclick="toggleComplete()">Mark Complete</button>
        </div>
      </div>

      <!-- View toggle: Notes HTML vs PDF Overlay -->
      <div class="view-toggle" id="view-toggle" style="display:none;">
        <button id="toggle-html" class="active" onclick="switchView('html')">📝 Notes</button>
        <button id="toggle-pdf"  onclick="switchView('pdf')">📄 PDF View</button>
      </div>

      <!-- HTML Notes content -->
      <div class="notes-content" id="nv-content" style="padding: 24px; background: rgba(255,255,255,0.02); border-radius: 12px; outline: none;"></div>

      <!-- PDF viewer toolbar + canvas pages -->
      <div id="pdf-viewer-area" style="display:none;">
        <div class="pdf-toolbar">
          <button onclick="PDFViewer.setScale(PDFViewer.getScale() - 0.25); updateZoomLabel()">−</button>
          <span class="zoom-label" id="zoom-label">150%</span>
          <button onclick="PDFViewer.setScale(PDFViewer.getScale() + 0.25); updateZoomLabel()">+</button>
          <button onclick="PDFViewer.setScale(1.5); updateZoomLabel()">Reset</button>
        </div>
        <div class="pdf-viewer-wrap">
          <div id="pdf-canvas-container"></div>
        </div>
      </div>
    </div>

  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script src="js/pdf_viewer.js"></script>
<script src="js/notes.js"></script>
<script>
  // Show Add Notes button for teacher/admin
  document.addEventListener('DOMContentLoaded', () => {
    const u = Auth.getUser();
    if (u && (u.role === 'teacher' || u.role === 'admin')) {
      document.getElementById('add-notes-btn').style.display = 'inline-flex';
    }
  });
</script>
</body>
</html>
