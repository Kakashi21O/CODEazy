<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in or create your free CODEazy account to start learning programming today.">
  <title>Login — CODEazy</title>

  <link rel="stylesheet" href="css/home_page.css">
  <link rel="stylesheet" href="css/auth.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────────────────── -->
<header></header>

<!-- ── Auth card ─────────────────────────────────────────────────────────── -->
<div class="auth-wrapper">
  <div class="auth-card">
    <h2 id="auth-title">Welcome back</h2>
    <p class="auth-sub" id="auth-sub">Sign in to continue learning</p>

    <!-- Tab switcher -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Login</button>
      <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Message area -->
    <div class="auth-msg" id="auth-msg"></div>

    <!-- Login form -->
    <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="login-email">Email address</label>
        <input type="email" id="login-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="auth-submit" id="login-btn">Sign In</button>
      <div class="auth-divider"><span>OR</span></div>
      <button type="button" class="auth-google" onclick="handleGoogleAuth()"><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.2C12.43 13.07 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.2C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.83l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg> Continue with Google</button>
    </form>

    <!-- Register form (hidden by default) -->
    <form class="auth-form" id="register-form" style="display:none;" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="reg-name">Full name</label>
        <input type="text" id="reg-name" placeholder="Alice Smith" required>
      </div>
      <div class="form-group">
        <label for="reg-email">Email address</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="reg-password">Password <span style="color:#555;">(min 6 chars)</span></label>
        <input type="password" id="reg-password" placeholder="••••••••" required minlength="6">
      </div>
      <button type="submit" class="auth-submit" id="register-btn">Create Account</button>
      <div class="auth-divider"><span>or</span></div>
      <button type="button" class="auth-google" onclick="handleGoogleAuth()"><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.2C12.43 13.07 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.2C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.83l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg> Continue with Google</button>
    </form>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
