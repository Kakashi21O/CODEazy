<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Meet the expert instructors behind CODEazy — passionate educators in Python, JavaScript, C++ and more.">
  <title>Teachers — CODEazy</title>

  <link rel="stylesheet" href="css/home_page.css">
  <link rel="stylesheet" href="css/teachers.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<header></header>

<main class="teachers-page">
  <div class="teachers-container">
    <p class="section-label">Our Instructors</p>
    <h1 class="section-heading">Meet the Teachers</h1>
    <p class="section-sub">Experienced professionals passionate about making programming accessible to everyone.</p>

    <div class="teachers-grid" id="teachers-grid">
      <div class="skeleton" style="height:180px;"></div>
      <div class="skeleton" style="height:180px;"></div>
      <div class="skeleton" style="height:180px;"></div>
    </div>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const grid = document.getElementById('teachers-grid');
  try {
    const teachers = await Teachers.getAll();
    grid.innerHTML = teachers.map(t => `
      <div class="teacher-card" style="animation-delay:${teachers.indexOf(t) * 0.1}s">
        <div class="teacher-avatar" style="--avatar-color:${t.color}">${t.avatar}</div>
        <div class="teacher-info">
          <div class="teacher-name">${t.name}</div>
          <div class="teacher-role">${t.role}</div>
          <div class="teacher-bio">${t.bio}</div>
          <div class="teacher-courses">
            ${t.courses.map(c => `<span class="teacher-course-tag">${c}</span>`).join('')}
          </div>
          <div class="teacher-stats">
            <div class="teacher-stat">
              <div class="teacher-stat-val">⭐ ${t.rating}</div>
              <div class="teacher-stat-label">Rating</div>
            </div>
            <div class="teacher-stat">
              <div class="teacher-stat-val">${t.students.toLocaleString()}</div>
              <div class="teacher-stat-label">Students</div>
            </div>
          </div>
        </div>
      </div>
    `).join('');
  } catch {
    grid.innerHTML = '<p style="color:#ff8080">Failed to load teachers. Is the server running?</p>';
  }
});
</script>
</body>
</html>
